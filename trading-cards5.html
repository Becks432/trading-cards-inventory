    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Cards Inventory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        table { border-collapse: collapse; width: 100%; }
        th, td { padding: 12px 8px; text-align: left; border-bottom: 1px solid #e5e7eb; }
        tr:hover { background-color: #f8fafc; }
    </style>
</head>
<body class="bg-gray-50">
    <div class="max-w-7xl mx-auto p-6">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-4xl font-bold">Trading Cards Inventory</h1>
            <div class="flex gap-4">
                <button onclick="setView('forsale')" id="forsaleBtn"
                        class="px-5 py-2 rounded-xl font-medium">For Sale</button>
                <button onclick="setView('sold')" id="soldBtn"
                        class="px-5 py-2 rounded-xl font-medium">Sold</button>
                <button onclick="showCart()" 
                        class="flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-2xl font-medium">
                    🛒 Cart <span id="cartCount" class="bg-white text-blue-600 rounded-full px-2.5 py-0.5 text-sm">0</span>
                </button>
            </div>
        </div>

        <!-- For Sale View -->
        <div id="forsaleView">
            <div class="bg-white p-6 rounded-2xl shadow mb-8 grid grid-cols-1 md:grid-cols-5 gap-6">
                <!-- Search, filters, sort same as before -->
                <div class="md:col-span-2">
                    <label class="block text-sm font-medium mb-2">Search</label>
                    <input type="text" id="searchInput" placeholder="Player or set..." class="w-full border rounded-xl px-4 py-3">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-2">Min Price</label>
                    <input type="number" id="minPrice" value="0" class="w-full border rounded-xl px-4 py-3">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-2">Max Price</label>
                    <input type="number" id="maxPrice" class="w-full border rounded-xl px-4 py-3">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-2">Sort By</label>
                    <select id="sortSelect" class="w-full border rounded-xl px-4 py-3">
                        <option value="price-desc">Price High to Low</option>
                        <option value="price-asc">Price Low to High</option>
                        <option value="player-asc">Player A-Z</option>
                    </select>
                </div>
            </div>

            <button onclick="addSelectedToCart()" class="mb-4 px-6 py-3 bg-green-600 hover:bg-green-700 text-white rounded-2xl font-medium">
                ➕ Add Selected to Cart
            </button>

            <div class="bg-white rounded-2xl shadow overflow-hidden">
                <table>
                    <thead class="bg-gray-100">
                        <tr>
                            <th class="w-10"><input type="checkbox" id="selectAll" onclick="toggleAll(this)"></th>
                            <th>Item #</th>
                            <th>Player</th>
                            <th>Set</th>
                            <th>Variant</th>
                            <th class="text-right">Price ($)</th>
                            <th>Card #</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>

        <!-- Sold View -->
        <div id="soldView" class="hidden">
            <div class="bg-white rounded-2xl shadow overflow-hidden">
                <table>
                    <thead class="bg-gray-100">
                        <tr>
                            <th class="w-10"><input type="checkbox" id="soldSelectAll" onclick="toggleSoldAll(this)"></th>
                            <th>Item #</th>
                            <th>Player</th>
                            <th>Set</th>
                            <th>Price ($)</th>
                            <th>Date Sold</th>
                        </tr>
                    </thead>
                    <tbody id="soldTableBody"></tbody>
                </table>
            </div>
            <button onclick="moveBackToSale()" class="mt-4 px-6 py-3 bg-amber-600 hover:bg-amber-700 text-white rounded-2xl font-medium">
                Move Selected Back to For Sale
            </button>
        </div>
    </div>

            document.getElementById('soldView').classList.toggle('hidden', view !== 'sold');
            
            document.getElementById('forsaleBtn').classList.toggle('bg-blue-600', view === 'forsale');
            document.getElementById('forsaleBtn').classList.toggle('text-white', view === 'forsale');
            document.getElementById('soldBtn').classList.toggle('bg-blue-600', view === 'sold');
            document.getElementById('soldBtn').classList.toggle('text-white', view === 'sold');
        }

        // ... rest of the logic (filter, cart, etc.) ...

        // Initial load
        setView('forsale');
        filterAndSort();
    </script>
