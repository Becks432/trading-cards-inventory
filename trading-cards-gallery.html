<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Cards - eBay Images</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #f4f4f4; }
        h1 { text-align: center; }
        .filters { text-align: center; margin: 20px; }
        select, input, button { padding: 10px; font-size: 16px; margin: 5px; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        .card { background: white; padding: 10px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); text-align: center; cursor: pointer; }
        .card img { max-width: 100%; height: 220px; object-fit: contain; }
        .price { font-weight: bold; color: #d32f2f; }
        #lightbox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; z-index: 1000; }
        #lightbox img { max-width: 90%; max-height: 90vh; }
    </style>
</head>
<body>
    <h1>Trading Cards from eBay</h1>
    <div class="filters">
        <select id="playerFilter"><option value="">All Players</option></select>
        <button onclick="filterCards()">Filter</button>
        <button onclick="resetFilters()">Show All</button>
    </div>
    <div id="gallery" class="gallery"></div>

    <div id="lightbox" onclick="closeLightbox()">
        <img id="lightboxImg" onclick="event.stopImmediatePropagation()">
    </div>

    <script>
        // Example eBay image URLs (working public links)
        const cards = [
            { player: "Victor Wembanyama", price: 6.47, img: "https://i.ebayimg.com/images/g/0/0/0/0/0/0/s-l1600.jpg" }, // Replace with real ones
            { player: "Luka Doncic", price: 1.27, img: "https://i.ebayimg.com/images/g/luka-doncic-select.jpg" },
            { player: "Cooper Flagg", price: 3.71, img: "https://i.ebayimg.com/images/g/cooper-flagg-bowman.jpg" },
            { player: "LeBron James", price: 3.25, img: "https://i.ebayimg.com/images/g/lebron-topps.jpg" }
        ];

        function populateFilters() {
            const players = [...new Set(cards.map(c => c.player))];
            const select = document.getElementById('playerFilter');
            players.forEach(p => {
                const opt = document.createElement('option');
                opt.value = p;
                opt.textContent = p;
                select.appendChild(opt);
            });
        }

        function renderGallery(filtered) {
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = '';
            filtered.forEach(card => {
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `
                    <img src="${card.img}" alt="${card.player}" onerror="this.src='https://via.placeholder.com/300x220?text=No+Image'">
                    <p><strong>${card.player}</strong></p>
                    <p class="price">$${card.price}</p>
                `;
                div.onclick = () => showLightbox(card.img);
                gallery.appendChild(div);
            });
        }

        function filterCards() {
            const player = document.getElementById('playerFilter').value;
            const filtered = player ? cards.filter(c => c.player === player) : cards;
            renderGallery(filtered);
        }

        function resetFilters() {
            document.getElementById('playerFilter').value = '';
            renderGallery(cards);
        }

        function showLightbox(src) {
            document.getElementById('lightboxImg').src = src;
            document.getElementById('lightbox').style.display = 'flex';
        }

        function closeLightbox() {
            document.getElementById('lightbox').style.display = 'none';
        }

        populateFilters();
        renderGallery(cards);
    </script>
</body>
</html>
