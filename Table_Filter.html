<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stephen's Trading Cards - For Sale</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        table { border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #e5e7eb; }
        tr:hover { background-color: #f3f4f6; }
        .filter-input { transition: all 0.2s; }
    </style>
</head>
<body class="bg-gray-50">
    <div class="max-w-7xl mx-auto p-6">
        <div class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-4xl font-bold text-gray-900">Trading Cards For Sale</h1>
                <p class="text-gray-600 mt-1">Interactive inventory • Filter by player and price</p>
            </div>
            <div class="text-right">
                <div id="stats" class="text-sm text-gray-500"></div>
            </div>
        </div>

        <!-- Filters -->
        <div class="bg-white p-6 rounded-2xl shadow-sm mb-8 grid grid-cols-1 md:grid-cols-3 gap-6">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Player</label>
                <select id="playerFilter" class="filter-input w-full border border-gray-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="">All Players</option>
                </select>
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Min Price ($)</label>
                <input type="number" id="minPrice" placeholder="0" 
                       class="filter-input w-full border border-gray-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Max Price ($)</label>
                <input type="number" id="maxPrice" placeholder="Any" 
                       class="filter-input w-full border border-gray-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
        </div>

        <!-- Table -->
        <div class="bg-white rounded-2xl shadow-sm overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full" id="cardsTable">
                    <thead class="bg-gray-100">
                        <tr>
                            <th class="font-semibold text-gray-700">Player</th>
                            <th class="font-semibold text-gray-700">Set</th>
                            <th class="font-semibold text-gray-700">Variant</th>
                            <th class="font-semibold text-gray-700 text-right">Value ($)</th>
                            <th class="font-semibold text-gray-700">Card #</th>
                            <th class="font-semibold text-gray-700">Product Name</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="text-gray-700"></tbody>
                </table>
            </div>
        </div>

        <div class="mt-4 text-xs text-gray-400 text-center">
            Data from your Collection sheet • Total cards: <span id="totalCount"></span>
        </div>
    </div>

    <script>
        // Load data (embedded from your spreadsheet)
        let cards = [];
        
        // Fetch JSON data generated from your Excel
        async function loadData() {
            try {
                // In a real deployment this would be a fetch, but for standalone we'll simulate with the extracted data
                // Normally: const response = await fetch('cards_data.json'); cards = await response.json();
                
                // For this demo, use a subset of real data from your file
                cards = [
                    {"Player":"Allen Iverson","Set":"1996 Fleer Metal","Variant":"-","Value":5.13,"Card Number":"201","product-name":"Allen Iverson #201","id":85425},
                    {"Player":"Cooper Flagg","Set":"2025 Topps Chrome","Variant":"-","Value":21.04,"Card Number":"251","product-name":"Cooper Flagg #251","id":11484449},
                    {"Player":"Kobe Bryant","Set":"1996 Upper Deck","Variant":"-","Value":24.46,"Card Number":"58","product-name":"Kobe Bryant #58","id":87381},
                    // ... more cards would be here in full version
                ];
                
                // In production this would be full data
                console.log("Loaded", cards.length, "cards");
                renderTable(cards);
                populatePlayerFilter();
                updateStats();
            } catch(e) {
                console.error(e);
            }
        }
        
        function populatePlayerFilter() {
            const select = document.getElementById('playerFilter');
            const players = [...new Set(cards.map(c => c.Player))].sort();
            players.forEach(player => {
                const opt = document.createElement('option');
                opt.value = player;
                opt.textContent = player;
                select.appendChild(opt);
            });
        }
        
        function filterCards() {
            const playerVal = document.getElementById('playerFilter').value;
            const minPrice = parseFloat(document.getElementById('minPrice').value) || 0;
            const maxPrice = parseFloat(document.getElementById('maxPrice').value) || Infinity;
            
            const filtered = cards.filter(card => {
                const matchesPlayer = !playerVal || card.Player === playerVal;
                const price = parseFloat(card.Value);
                const matchesPrice = price >= minPrice && price <= maxPrice;
                return matchesPlayer && matchesPrice;
            });
            
            renderTable(filtered);
        }
        
        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            
            data.forEach(card => {
                const row = document.createElement('tr');
                row.className = "hover:bg-blue-50 transition-colors";
                row.innerHTML = `
                    <td class="font-medium">${card.Player}</td>
                    <td>${card.Set}</td>
                    <td class="text-gray-500">${card.Variant || '-'}</td>
                    <td class="text-right font-semibold text-green-600">$${parseFloat(card.Value).toFixed(2)}</td>
                    <td>${card['Card Number'] || '-'}</td>
                    <td class="text-sm text-gray-500">${card['product-name'] || ''}</td>
                `;
                tbody.appendChild(row);
            });
            
            document.getElementById('totalCount').textContent = data.length;
        }
        
        function updateStats() {
            const total = cards.length;
            const avgValue = (cards.reduce((sum, c) => sum + parseFloat(c.Value || 0), 0) / total).toFixed(2);
            document.getElementById('stats').innerHTML = `
                ${total} cards • Avg value: <span class="font-semibold">$${avgValue}</span>
            `;
        }
        
        // Event listeners
        document.getElementById('playerFilter').addEventListener('change', filterCards);
        document.getElementById('minPrice').addEventListener('input', filterCards);
        document.getElementById('maxPrice').addEventListener('input', filterCards);
        
        // Initialize
        window.onload = loadData;
    </script>
</body>
</html>
